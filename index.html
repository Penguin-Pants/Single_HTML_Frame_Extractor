<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Frame Extractor</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff; --fg: #1a1a1a; --muted: #666; --border: #d0d0d0;
      --accent: #2563eb; --panel: #f6f7f9; --drop: #fafbfc;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#15171a; --fg:#e8e8e8; --muted:#9aa0a6; --border:#33373c;
              --accent:#5b8cff; --panel:#1c1f23; --drop:#1a1d21; }
    }
    * { box-sizing: border-box; }
    body { margin:0; font:15px/1.5 system-ui, sans-serif; background:var(--bg); color:var(--fg); }
    main { max-width: 880px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 1.4rem; margin: 0 0 4px; }
    .sub { color: var(--muted); margin: 0 0 20px; }
    #dropzone {
      border: 2px dashed var(--border); border-radius: 12px; background: var(--drop);
      padding: 40px; text-align: center; cursor: pointer; transition: border-color .15s, background .15s;
    }
    #dropzone.dragover { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, var(--drop)); }
    #dropzone.hidden { display: none; }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-top: 18px; }
    .panel.hidden { display: none; }
    .row { display: flex; flex-wrap: wrap; gap: 16px; align-items: end; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 12px; color: var(--muted); }
    input, select { padding: 8px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--fg); }
    button { padding: 10px 16px; border: 0; border-radius: 8px; background: var(--accent); color: #fff; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    progress { width: 100%; height: 14px; }
    #status { color: var(--muted); min-height: 1.2em; margin-top: 8px; }
    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); gap: 8px; margin-top: 16px; }
    #grid img { width: 100%; border-radius: 6px; border: 1px solid var(--border); }
    .meta { color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  <main>
    <h1>Frame Extractor</h1>
    <p class="sub">Extract frames from a video — 100% in your browser. Your file is never uploaded.</p>

    <div id="dropzone">
      <p><strong>Drop a video here</strong> or click to choose</p>
      <p class="meta">Processed locally. Nothing is sent anywhere.</p>
      <input id="fileInput" type="file" accept="video/*" hidden />
    </div>

    <section id="controls" class="panel hidden">
      <p id="videoMeta" class="meta"></p>
      <div class="row">
        <div class="field">
          <label for="interval">Interval (seconds)</label>
          <input id="interval" type="number" min="0.04" step="0.1" value="1" />
        </div>
        <div class="field">
          <label for="format">Format</label>
          <select id="format">
            <option value="image/png">PNG (lossless, large)</option>
            <option value="image/jpeg" selected>JPEG (small)</option>
            <option value="image/webp">WebP (small)</option>
          </select>
        </div>
        <div class="field">
          <label for="quality">Quality (JPEG/WebP)</label>
          <input id="quality" type="number" min="0.1" max="1" step="0.05" value="0.9" />
        </div>
        <div class="field">
          <label for="maxFrames">Max frames</label>
          <input id="maxFrames" type="number" min="1" step="1" value="300" />
        </div>
        <div class="field">
          <button id="extractBtn">Extract frames</button>
        </div>
      </div>
      <progress id="progress" value="0" max="1" hidden></progress>
      <div id="status"></div>
    </section>

    <div id="grid"></div>
  </main>

  <script>
  (() => {
    "use strict";
    const $ = (id) => document.getElementById(id);
    const dropzone = $("dropzone"), fileInput = $("fileInput"), controls = $("controls");
    const videoMeta = $("videoMeta"), status = $("status"), grid = $("grid");
    const intervalEl = $("interval"), formatEl = $("format"), qualityEl = $("quality"),
          maxFramesEl = $("maxFrames"), extractBtn = $("extractBtn"), progress = $("progress");

    const video = document.createElement("video");
    video.muted = true; video.playsInline = true; video.preload = "auto";

    let currentURL = null;
    let loaded = false;
    let running = false;
    let cancelRequested = false;

    function setStatus(msg) { status.textContent = msg; }

    function loadFile(file) {
      if (!file) return;
      if (!file.type.startsWith("video/")) { setStatus("Not a video file: " + (file.type || "unknown")); return; }
      if (currentURL) URL.revokeObjectURL(currentURL);
      currentURL = URL.createObjectURL(file);   // <-- local only, no upload
      loaded = false;
      setStatus("Loading video…");
      grid.innerHTML = "";
      video.src = currentURL;
    }

    video.addEventListener("loadedmetadata", () => {
      loaded = true;
      controls.classList.remove("hidden");
      dropzone.classList.add("hidden");
      updateMeta();
      setStatus("Ready.");
    });
    video.addEventListener("error", () => {
      setStatus("Could not decode this video. The browser may not support its codec.");
    });

    function updateMeta() {
      if (!loaded) return;
      const interval = Math.max(0.04, parseFloat(intervalEl.value) || 1);
      const est = Math.min(parseInt(maxFramesEl.value) || 1, Math.floor(video.duration / interval) + 1);
      videoMeta.textContent =
        `${video.videoWidth}×${video.videoHeight} · ${video.duration.toFixed(1)}s · ~${est} frames at ${interval}s interval`;
    }
    intervalEl.addEventListener("input", updateMeta);
    maxFramesEl.addEventListener("input", updateMeta);

    // --- input wiring ---
    dropzone.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", (e) => loadFile(e.target.files[0]));
    ["dragenter", "dragover"].forEach((ev) =>
      dropzone.addEventListener(ev, (e) => { e.preventDefault(); dropzone.classList.add("dragover"); }));
    ["dragleave", "drop"].forEach((ev) =>
      dropzone.addEventListener(ev, (e) => { e.preventDefault(); dropzone.classList.remove("dragover"); }));
    dropzone.addEventListener("drop", (e) => loadFile(e.dataTransfer.files[0]));

    // --- seek-and-capture (correctness-critical) ---
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    function seekTo(t) {
      return new Promise((resolve) => {
        let done = false;
        const finish = () => {
          if (done) return; done = true;
          video.removeEventListener("seeked", onSeeked);
          // wait two animation frames so the decoded frame is actually painted
          requestAnimationFrame(() => requestAnimationFrame(resolve));
        };
        const onSeeked = () => finish();
        video.addEventListener("seeked", onSeeked);
        // fallback if 'seeked' never fires (e.g. target == current time)
        setTimeout(finish, 200);
        video.currentTime = t;
      });
    }

    async function captureFrameAt(t, mime, quality) {
      await seekTo(t);
      if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
        canvas.width = video.videoWidth;     // original resolution
        canvas.height = video.videoHeight;
      }
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const blob = await new Promise((res) =>
        canvas.toBlob(res, mime, mime === "image/png" ? undefined : quality));
      if (!blob) throw new Error("Frame encoding failed (toBlob returned null)");
      return blob;
    }

    // --- frame planning + extraction loop ---
    function planTimestamps() {
      const interval = Math.max(0.04, parseFloat(intervalEl.value) || 1);
      const maxFrames = Math.max(1, parseInt(maxFramesEl.value) || 1);
      const times = [];
      for (let t = 0; t < video.duration && times.length < maxFrames; t += interval) {
        times.push(Math.min(t, video.duration - 0.05));
      }
      return times;
    }

    function pad(n, width) { return String(n).padStart(width, "0"); }

    async function extractAll() {
      const times = planTimestamps();
      const mime = formatEl.value, quality = parseFloat(qualityEl.value);
      const ext = mime === "image/png" ? "png" : mime === "image/webp" ? "webp" : "jpg";
      const width = String(times.length).length;
      const frames = [];

      cancelRequested = false;
      grid.innerHTML = "";
      progress.hidden = false; progress.value = 0; progress.max = times.length;

      for (let i = 0; i < times.length; i++) {
        if (cancelRequested) { setStatus(`Cancelled at ${i} / ${times.length}`); break; }
        const blob = await captureFrameAt(times[i], mime, quality);
        const name = `frame_${pad(i + 1, width)}_${times[i].toFixed(2)}s.${ext}`;
        frames.push({ name, blob });

        const img = document.createElement("img");
        img.src = URL.createObjectURL(blob);
        img.title = name;
        grid.appendChild(img);

        progress.value = i + 1;
        setStatus(`Captured ${i + 1} / ${times.length}`);
        // yield so the UI can paint
        await new Promise((r) => setTimeout(r, 0));
      }
      return frames;
    }

    extractBtn.addEventListener("click", async () => {
      if (!loaded) return;
      if (running) { cancelRequested = true; return; }
      running = true; extractBtn.textContent = "Cancel";
      try {
        const frames = await extractAll();      // Task 5 will zip + download these
        setStatus(`Done. ${frames.length} frames captured.`);
      } catch (err) {
        setStatus("Error: " + err.message);
      } finally {
        running = false; extractBtn.textContent = "Extract frames"; progress.hidden = true;
      }
    });

    window.__fe = { video, get url(){ return currentURL; }, get loaded(){ return loaded; }, setStatus, captureFrameAt, planTimestamps };
  })();
  </script>
</body>
</html>
